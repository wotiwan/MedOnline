<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Профиль пользователя</title>
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>
<body>
<div th:replace="fragments/header :: main-header"></div>

<div class="container profile-page">
  <div class="page-header">
    <h1>Профиль пользователя</h1>
  </div>

  <!-- Карточка пользователя -->
  <div class="user-card">
    <div class="user-info">
      <p><strong>Электронная почта:</strong> <span th:text="${user.email}"></span></p>
      <p><strong>Имя:</strong> <span th:text="${user.firstName}"></span></p>
      <p><strong>Отчество:</strong> <span th:text="${user.middleName}"></span></p>
      <p><strong>Фамилия:</strong> <span th:text="${user.lastName}"></span></p>
      <p><strong>Дата рождения:</strong> <span th:text="${user.birthDate}"></span></p>
      <p><strong>Роль:</strong> <span th:text="${user.role.name}"></span></p>
    </div>

    <button id="editBtn" class="btn primary">Редактировать данные</button>

    <form th:action="@{/profile}" th:object="${user}" method="post" class="edit-form" id="editForm">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label>Имя</label>
        <input type="text" th:field="*{firstName}" required/>
      </div>

      <div class="form-group">
        <label>Отчество</label>
        <input type="text" th:field="*{middleName}"/>
      </div>

      <div class="form-group">
        <label>Фамилия</label>
        <input type="text" th:field="*{lastName}" required/>
      </div>

      <div class="form-group">
        <label>Дата рождения</label>
        <input type="date" th:field="*{birthDate}" required/>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn save-btn">Сохранить</button>
        <button type="button" class="btn cancel-btn" id="cancelBtn">Отмена</button>
      </div>
    </form>
  </div>

  <!-- Таблица записей -->
  <div class="appointments-section">
    <h2>Мои записи</h2>

    <div th:if="${#lists.isEmpty(appointments)}" class="empty-state">
      <p>У вас пока нет записей</p>
    </div>

    <div th:if="${!#lists.isEmpty(appointments)}" class="appointments-grid">
      <div th:each="a : ${appointments}" class="appointment-card clickable-row"
           th:onclick="|window.location.href='/appointments/${a.id}'|">

        <div class="appointment-info">
          <p><strong>Врач:</strong> <span th:text="${a.doctor.user.firstName} + ' ' + ${a.doctor.user.lastName}"></span></p>
          <p><strong>Специализация:</strong> <span th:text="${a.doctor.specialization.name}"></span></p>
          <p><strong>Дата:</strong> <span th:text="${#temporals.format(a.timeSlot.startTime, 'dd.MM.yyyy')}"></span></p>
          <p><strong>Время:</strong> <span th:text="${#temporals.format(a.timeSlot.startTime, 'HH:mm')}"></span> -
            <span th:text="${#temporals.format(a.timeSlot.endTime, 'HH:mm')}"></span></p>
        </div>

        <div class="appointment-status">
          <span class="status"
                th:classappend="
                ${a.status.name() == 'BOOKED'} ? ' booked' :
                (${a.status.name() == 'CANCELLED'} ? ' cancelled' : ' completed')"
                th:text="${a.status}">
          </span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const editBtn = document.getElementById('editBtn');
  const editForm = document.getElementById('editForm');
  const cancelBtn = document.getElementById('cancelBtn');

  editBtn.addEventListener('click', () => {
    editForm.style.display = 'block';
    editBtn.style.display = 'none';
  });

  cancelBtn.addEventListener('click', () => {
    editForm.style.display = 'none';
    editBtn.style.display = 'inline-block';
  });
</script>
</body>
</html>

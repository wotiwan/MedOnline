<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Профиль пользователя</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/appointments.css}">
  <style>
    .edit-form { display: none; margin-top: 20px; }
    .form-group { margin-bottom: 12px; }
    input[type="text"], input[type="date"] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
    button { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; }
    .save-btn { background-color: #27ae60; color: white; }
    .cancel-btn { background-color: #7f8c8d; color: white; margin-left: 8px; }
  </style>
</head>
<body>
<div class="container">
  <div th:replace="fragments/header :: main-header"></div>
  <h2>Профиль пользователя</h2>

  <!-- Данные пользователя -->
  <div class="user-info">
    <p><strong>Электронная почта:</strong> <span th:text="${user.email}">user@example.com</span></p>
    <p><strong>Имя:</strong> <span th:text="${user.firstName}">Имя</span></p>
    <p><strong>Отчество:</strong> <span th:text="${user.middleName}">Отчество</span></p>
    <p><strong>Фамилия:</strong> <span th:text="${user.lastName}">Фамилия</span></p>
    <p><strong>Дата рождения:</strong> <span th:text="${user.birthDate}">2000-01-01</span></p>
    <p><strong>Роль:</strong> <span th:text="${user.role.name}">PATIENT</span></p>
  </div>

  <!-- Кнопка редактирования -->
  <button id="editBtn" style="background-color: #3498db; color: white;">Редактировать данные</button>

  <!-- Форма редактирования -->
  <form th:action="@{/profile}" th:object="${user}" method="post" class="edit-form" id="editForm">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="form-group">
      <label>Имя</label>
      <input type="text" th:field="*{firstName}" required/>
    </div>

    <div class="form-group">
      <label>Отчество</label>
      <input type="text" th:field="*{middleName}"/>
    </div>

    <div class="form-group">
      <label>Фамилия</label>
      <input type="text" th:field="*{lastName}" required/>
    </div>

    <div class="form-group">
      <label>Дата рождения</label>
      <input type="date" th:field="*{birthDate}" required/>
    </div>

    <button type="submit" class="save-btn">Сохранить</button>
    <button type="button" class="cancel-btn" id="cancelBtn">Отмена</button>
  </form>

  <h3>Мои записи</h3>

  <div th:if="${#lists.isEmpty(appointments)}">
    <p>У вас пока нет записей</p>
  </div>

  <table th:if="${!#lists.isEmpty(appointments)}">
    <tr>
      <th>Врач</th>
      <th>Специализация</th>
      <th>Дата</th>
      <th>Время</th>
      <th>Статус</th>
    </tr>

    <tr th:each="a : ${appointments}"
        th:onclick="|window.location.href='/appointments/${a.id}'|"
        class="clickable-row">

      <td th:text="${a.doctor.user.firstName} + ' ' + ${a.doctor.user.lastName}"></td>

      <td th:text="${a.doctor.specialization.name}"></td>

      <td th:text="${#temporals.format(a.timeSlot.startTime, 'dd.MM.yyyy')}"></td>

      <td>
        <span th:text="${#temporals.format(a.timeSlot.startTime, 'HH:mm')}"></span>
        -
        <span th:text="${#temporals.format(a.timeSlot.endTime, 'HH:mm')}"></span>
      </td>

      <td>
        <span class="status"
              th:classappend="
                ${a.status.name() == 'BOOKED'} ? ' booked' :
                (${a.status.name() == 'CANCELLED'} ? ' cancelled' : ' completed')"
              th:text="${a.status}">
        </span>
      </td>

    </tr>
  </table>

  <!-- Logout -->
  <form th:action="@{/logout}" method="post" style="margin-top: 20px;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background-color: #e74c3c; color: white;">Выйти</button>
  </form>
</div>

<script>
  const editBtn = document.getElementById('editBtn');
  const editForm = document.getElementById('editForm');
  const cancelBtn = document.getElementById('cancelBtn');

  editBtn.addEventListener('click', () => {
    editForm.style.display = 'block';
    editBtn.style.display = 'none';
  });

  cancelBtn.addEventListener('click', () => {
    editForm.style.display = 'none';
    editBtn.style.display = 'inline-block';
  });
</script>
</body>
</html>

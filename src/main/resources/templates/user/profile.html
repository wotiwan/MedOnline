<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Профиль пользователя</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div class="container">
  <div th:replace="fragments/header :: main-header"></div>
  <h2>Профиль пользователя</h2>

  <p><strong>Имя пользователя:</strong> <span th:text="${user.email}">user@example.com</span></p>
  <p><strong>Роль:</strong> <span th:text="${user.role.name}">PATIENT</span></p>

  <form th:action="@{/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background-color: #e74c3c;">Выйти</button>
  </form>
</div>
</body>
</html>

<!-- src/main/resources/templates/fragments/header.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
<!-- Фрагмент шапки -->
<div th:fragment="main-header">
    <header class="app-header">
        <div class="header-inner">

            <!-- Логотип -->
            <div class="logo">
                <a th:href="@{/}">MedOnline</a>
            </div>

            <!-- Навигация -->
            <nav class="nav-links">
                <span>
                    <a th:href="@{/}" class="nav-link">Главная</a>
                </span>

                <span sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin}" class="nav-link">Админ</a>
                </span>

                <span sec:authorize="hasRole('DOCTOR')">
                    <a th:href="@{/doctor/appointments}" class="nav-link">Расписание</a>
                </span>

                <span sec:authorize="isAuthenticated()">
                    <a th:href="@{/profile}" class="nav-link">Профиль</a>
                </span>
            </nav>

            <!-- Правая часть -->
            <div class="nav-actions" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="logout-btn">Выйти</button>
                </form>
            </div>

        </div>
    </header>
</div>
</body>
</html>

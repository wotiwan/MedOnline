<!-- src/main/resources/templates/fragments/header.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
<!-- Фрагмент шапки -->
<div th:fragment="main-header">
    <header style="background-color: #3498db; color: white; padding: 16px 24px; text-align: center;">
        <span>Медицинский портал</span>
        <nav style="margin-top: 8px;">
            <a th:href="@{/}" style="color: white; margin-right: 16px;">Главная</a>

            <!-- Показываем админ-панель только для ADMIN -->
            <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin}" style="color: white; margin-right: 16px;">Админ</a>
            </span>

            <!-- Профиль для всех авторизованных -->
            <span sec:authorize="isAuthenticated()">
                <a th:href="@{/profile}" style="color: white; margin-right: 16px;">Профиль</a>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" style="background: none; border: none; color: white; cursor: pointer;">Выйти</button>
                </form>
            </span>
        </nav>
    </header>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Запись к врачу</title>

  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>

<body>

<!-- Header -->
<div th:replace="fragments/header :: main-header"></div>

<div class="container">

  <!-- Заголовок -->
  <div class="page-header">
    <h1>Запись к врачу</h1>
    <p th:text="${doctor.lastName} + ' ' + ${doctor.firstName} + ' ' + ${doctor.middleName}"></p>
  </div>

  <!-- Контролы -->
  <div class="booking-controls">

    <!-- выбор даты -->
    <form method="get" th:action="@{/appointments/create}">
      <input type="hidden" name="doctorId" th:value="${doctorId}"/>

      <input type="date"
             name="date"
             th:value="${date}"
             class="date-input"
             onchange="this.form.submit()"/>
    </form>

    <!-- навигация -->
    <div class="date-nav">
      <a th:href="@{'/appointments/create?doctorId=' + ${doctorId} + '&date=' + ${date.minusDays(1)}}">←</a>

      <span th:text="${date}"></span>

      <a th:href="@{'/appointments/create?doctorId=' + ${doctorId} + '&date=' + ${date.plusDays(1)}}">→</a>
    </div>

  </div>

  <!-- Слоты -->
  <div class="slots-grid">

    <div th:if="${#lists.isEmpty(slots)}" class="empty-state">
      Нет доступных слотов
    </div>

    <div th:each="slot : ${slots}">

      <!-- свободный слот -->
      <button th:if="${!slot.isBooked}"
              class="slot free"
              onclick="openModal(this)"
              th:data-id="${slot.id}"
              th:data-start="${#temporals.format(slot.startTime, 'HH:mm')}"
              th:data-end="${#temporals.format(slot.endTime, 'HH:mm')}">

        <span th:text="${#temporals.format(slot.startTime, 'HH:mm')}"></span>
        —
        <span th:text="${#temporals.format(slot.endTime, 'HH:mm')}"></span>
      </button>

      <!-- занятый слот -->
      <div th:if="${slot.isBooked}" class="slot booked">
        <span th:text="${#temporals.format(slot.startTime, 'HH:mm')}"></span>
        —
        <span th:text="${#temporals.format(slot.endTime, 'HH:mm')}"></span>
      </div>

    </div>
  </div>

</div>

<!-- МОДАЛКА (одна!) -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h3>Подтверждение записи</h3>

    <p>
      <strong>Врач:</strong>
      <span th:text="${doctor.lastName} + ' ' + ${doctor.firstName} + ' ' + ${doctor.middleName}"></span>
    </p>

    <p>
      <strong>Время:</strong>
      <span id="modalTime"></span>
    </p>

    <form th:action="@{/appointments/book}" method="post">
      <input type="hidden" name="slotId" id="modalSlotId"/>
      <input type="hidden" name="doctorId" th:value="${doctorId}"/>
      <input type="hidden" name="date" th:value="${date}"/>

      <button type="submit" class="btn primary">Подтвердить</button>
    </form>

    <button onclick="closeModal()" class="btn secondary">Отмена</button>

  </div>
</div>

<script>
  function openModal(button) {

    document.querySelectorAll(".slot").forEach(el => {
      el.classList.remove("selected");
    });

    button.classList.add("selected");

    const slotId = button.dataset.id;
    const start = button.dataset.start;
    const end = button.dataset.end;

    const modal = document.getElementById("modal");

    modal.classList.add("show");

    document.getElementById("modalSlotId").value = slotId;
    document.getElementById("modalTime").innerText = start + " - " + end;
  }

  function closeModal() {
    document.getElementById("modal").classList.remove("show");
  }

  // закрытие по клику вне окна
  window.onclick = function(event) {
    const modal = document.getElementById("modal");
    if (event.target === modal) {
      closeModal();
    }
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание врача</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/doctor-appointment-details.css}">
</head>
<body>

<div th:replace="fragments/header :: main-header"></div>

<div class="container">

    <div class="page-header">
        <h1>Консультация</h1>
    </div>

    <div class="form-card">
        <form th:action="@{'/doctor/appointments/' + ${appointmentId}}" method="post">

            <div class="form-group">
                <label>Статус</label>
                <select name="status">
                    <option value="BOOKED">BOOKED</option>
                    <option value="COMPLETED">COMPLETED</option>
                    <option value="CANCELLED">CANCELLED</option>
                </select>
            </div>

            <div class="form-group">
                <label>Результат консультации</label>
                <textarea name="consultationResult" rows="5"></textarea>
            </div>

            <button type="submit" class="btn primary">Сохранить</button>
        </form>
    </div>

</div>

</body>
</html>

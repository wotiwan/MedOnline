<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Админ-панель</title>
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/admin-panel.css}">
</head>
<body>
<div th:replace="fragments/header :: main-header"></div>

<div class="container">

  <div class="page-header">
    <h1>Админ-панель</h1>
    <p>Функции администрирования системы</p>
  </div>

  <div class="admin-grid">

    <div class="admin-card">
      <h3>Пользователи</h3>
      <p>Просмотр и управление всеми пользователями системы.</p>
      <a th:href="@{/admin/users}">
        <button class="btn primary">Список всех пользователей</button>
      </a>
    </div>

    <div class="admin-card">
      <h3>Врачи</h3>
      <p>Добавление новых врачей и редактирование существующих.</p>
      <a th:href="@{/admin/doctors/full/create}">
        <button class="btn primary">Создать врача с нуля</button>
      </a>
    </div>

  </div>

</div>
</body>
</html>

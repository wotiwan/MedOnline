<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Главная - Медицинский портал</title>
    <link rel="stylesheet" th:href="@{/css/mainpage.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
</head>
<body>
<div th:replace="fragments/header :: main-header"></div>
<div class="container">
    <div class="page-header">
        <h1>Запись к врачу</h1>
        <p>Выберите специализацию, чтобы продолжить</p>
    </div>

    <div class="specializations-grid">
        <a th:each="s : ${specializations}"
           th:href="@{'/doctors?specializationId=' + ${s.id}}"
           class="spec-card">

            <div class="spec-card-content">
                <h3 th:text="${s.name}"></h3>
                <span class="spec-link">Выбрать →</span>
            </div>

        </a>
    </div>
</div>
</body>
</html>

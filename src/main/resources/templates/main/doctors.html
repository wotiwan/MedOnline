<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${specialization.name}">Специализация</title>
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/doctors.css}">
</head>
<body>
<div th:replace="fragments/header :: main-header"></div>
<div class="container">

  <div class="page-header">
    <h1>Врачи</h1>
    <p th:text="${specialization.name}"></p>
  </div>

  <div th:if="${#lists.isEmpty(doctors)}" class="empty-state">
    <p>Нет доступных врачей</p>
  </div>

  <div class="doctors-grid">
    <div th:each="d : ${doctors}" class="doctor-card">

      <div class="doctor-info">
        <!-- тут лучше ФИО, если есть -->
        <h3 th:text="${d.lastName} + ' ' + ${d.firstName} + ' ' + ${d.middleName}"></h3>

        <p class="doctor-desc" th:text="${d.description}"></p>
      </div>

      <div class="doctor-actions">
        <a th:href="@{'/appointments/create?doctorId=' + ${d.id}}">
          <button class="btn primary">Записаться</button>
        </a>
      </div>

    </div>
  </div>

</div>
</body>
</html>
